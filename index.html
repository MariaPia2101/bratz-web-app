<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRATZ — Join the Worldz</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="onboarding">
        <img class="logo" src="assets/images/logo_image.gif" alt="Bratz">

        <form class="card" id="onboarding-form" novalidate>
            <div class="card-text">
                <h1 class="title">Join the<br>Worldz</h1>
                <p class="subtitle">
                    You know the code.<br>
                    Every Bratz comes with a key,<br>
                    enter yours and step inside.
                </p>
            </div>

            <div class="fields">
                <!-- Fase 1: solo il Pack Code è attivo -->
                <div class="field" data-field="pack">
                    <input type="text" id="pack-code" class="input" placeholder="Pack code" autocomplete="off"
                        spellcheck="false">
                </div>

                <!-- Fase 2: Nickname (sbloccato dopo il pack code valido) -->
                <div class="field" data-field="nickname">
                    <input type="text" id="nickname" class="input" placeholder="Nickname" autocomplete="off"
                        spellcheck="false" disabled>
                    <p class="msg" id="nickname-msg" aria-live="polite"></p>
                </div>

                <!-- Fase 3: Password -->
                <div class="field" data-field="password">
                    <input type="password" id="password" class="input" placeholder="Password" autocomplete="off"
                        disabled>
                </div>
            </div>

            <button type="submit" class="primary-button" id="start-btn" disabled>Start</button>
        </form>
    </main>

    <!-- ===== LOADING PAGE (pagina di transito) — nascosta di default ===== -->
    <section class="loading-page" id="loading-page" aria-hidden="true">
        <div class="loading-input">
            <img class="loading-logo" src="assets/images/logo_image.gif" alt="Bratz">

            <div class="container-bar-and-text">
                <div class="loading-bar" id="loading-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100"
                    aria-valuenow="0">
                    <div class="loading-bar-fill" id="loading-bar-fill"></div>
                </div>
                <p class="loading-text" id="loading-text">Loading...</p>
            </div>
        </div>
    </section>

    <!-- ===== ENTER PAGE (schermata finale) — nascosta di default ===== -->
    <section class="enter-page" id="enter-page" aria-hidden="true">
        <img class="enter-logo" src="assets/images/logo_image.gif" alt="Bratz">

        <div class="enter-buttons" id="enter-buttons">
            <button type="button" class="primary-button active" id="enter-dollz-btn">marpi.dollz</button>
            <button type="button" class="primary-button" id="enter-community-btn" disabled>community</button>
        </div>

        <aside class="enter-popup" id="enter-popup" aria-hidden="false">
            <button type="button" class="enter-popup-close" id="enter-popup-close">Close</button>
            <p class="enter-popup-text">It's time to explore.<br>Write stories for your<br>dolls and create your<br>personal
                magazine.<br>Go to your profile and<br>connect with the community<br>after your first release.</p>
        </aside>
    </section>
<!--ciao  -->
    <script src="audio.js"></script>
    <script src="community-unlock.js"></script>
    <script src="script.js"></script>
    <script src="click-sound.js?v=2"></script>
</body>

</html>
