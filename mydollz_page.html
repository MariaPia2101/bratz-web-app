<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRATZ — My Dollz</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- ===== LOADING PAGE: visibile finché il caricamento REALE della pagina non è completo ===== -->
    <section class="loading-page" id="loading-page" style="display:flex;opacity:1;" aria-hidden="false">
        <div class="loading-input">
            <img class="loading-logo" src="assets/images/logo_image.gif" alt="Bratz">

            <div class="container-bar-and-text">
                <div class="loading-bar" id="loading-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100"
                    aria-valuenow="0">
                    <div class="loading-bar-fill" id="loading-bar-fill"></div>
                </div>
                <p class="loading-text" id="loading-text">Loading...</p>
            </div>
        </div>
    </section>

    <!-- ===== MY DOLLZ PAGE ===== -->
    <main class="mydollz-page">
        <div class="mydollz-page__content" id="mydollz-content">
            <!-- container_mydollz_page -->
            <div class="container-mydollz-page">

                <!-- upper_container_user_pages -->
                <div class="upper-container-mydollz">
                    <header class="user-header">
                        <button type="button" class="primary-button is-current" id="user-dollz-btn">marpi.dollz</button>
                        <img class="user-logo" src="assets/images/logo_image.gif" alt="Bratz">
                        <button type="button" class="primary-button" id="user-community-btn" disabled>community</button>
                    </header>

                    <!-- container_title: back + "My dollz" -->
                    <div class="container-title">
                        <button type="button" class="back-button" id="mydollz-back-btn" aria-label="Torna indietro">
                            <img src="assets/images/arrowbutton.svg" alt="">
                        </button>
                        <h1 class="card-title">My dollz</h1>
                    </div>
                </div>

                <!-- bottom_container_mydollz_page -->
                <div class="bottom-container-mydollz">
                    <!-- container_doll_button: foto+nome + plus -->
                    <div class="container-doll-button">
                        <div class="container-doll-photo-text">
                            <div class="doll-photo">
                                <img src="assets/images/yasmindoll_image.png" alt="Yasmin">
                            </div>
                            <div class="container-doll-text">
                                <p class="doll-name">yasmin</p>
                                <p class="doll-collection">Always Bratz</p>
                            </div>
                        </div>

                        <button type="button" class="icon-button" id="mydollz-plus-btn" aria-label="Aggiungi una doll">
                            <span class="icon-button__inner">
                                <svg class="icon-button__plus" viewBox="0 0 20 20" fill="none"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path d="M10 1V19M1 10H19" stroke="black" stroke-width="1.2" />
                                </svg>
                            </span>
                        </button>
                    </div>

                    <!-- pop_up: profilo doll -->
                    <aside class="doll-popup doll-popup--profile" id="popup-profile">
                        <button type="button" class="doll-popup__close">Close</button>
                        <p class="doll-popup__text">Click your girl to check out her profile.</p>
                    </aside>

                    <!-- pop_up: aggiungi doll -->
                    <aside class="doll-popup doll-popup--add" id="popup-add">
                        <button type="button" class="doll-popup__close">Close</button>
                        <p class="doll-popup__text">Click the plus botton to get a new doll.</p>
                    </aside>
                </div>

            </div>
        </div>
    </main>

    <script src="mydollz_page.js"></script>
</body>

</html>
