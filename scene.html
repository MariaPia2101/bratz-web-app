<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRATZ — 3D Worldz</title>
    <link rel="stylesheet" href="style.css">

    <!--
      Import map: three.js viene caricato da CDN (nessun build system).
      "three"          -> il core del motore
      "three/addons/"  -> loader e utility (GLTFLoader, DRACOLoader, OrbitControls, RoomEnvironment)
      Nota: gira nel browser dell'utente, non serve rete lato repo.
    -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <style>
        /* La scena occupa tutto lo schermo; il canvas sta sotto all'overlay di caricamento. */
        html, body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        #scene-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
            touch-action: none; /* i gesti (pinch/drag) vanno agli OrbitControls, non allo scroll */
        }

        /* Overlay di caricamento: riusa lo stile del sito, resta finché la scena non è pronta. */
        #scene-loading {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            transition: opacity 0.6s ease;
        }

        #scene-loading.is-hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Suggerimento comandi: si dissolve dopo qualche secondo. */
        #scene-hint {
            position: fixed;
            left: 50%;
            bottom: 22px;
            transform: translateX(-50%);
            z-index: 5;
            padding: 8px 16px;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.45);
            color: #fff;
            font-family: system-ui, sans-serif;
            font-size: 13px;
            letter-spacing: 0.02em;
            white-space: nowrap;
            pointer-events: none;
            transition: opacity 0.8s ease;
        }

        #scene-hint.is-faded {
            opacity: 0;
        }

        /* ===== Overlay "stories" (iframe a tutto schermo) ===== */
        .stories-frame {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
            z-index: 20; /* sopra la scena e l'overlay del gioco */
            background: #fff;
        }
        .stories-frame[hidden] { display: none; }

        /* ===== Overlay "3dgame/enter_page" (da Figma) sopra la scena 3D ===== */
        #game-overlay {
            position: fixed;
            inset: 0;
            z-index: 6;
            pointer-events: none; /* il 3D resta interattivo; solo i controlli catturano il click */
        }

        #game-overlay .go-header {
            position: absolute;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: min(1344px, 94vw);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #game-overlay .go-header .primary-button {
            width: 207px;
            pointer-events: auto;
        }

        #game-overlay .go-logo {
            width: 166px;
            height: 85px;
            object-fit: contain;
            user-select: none;
        }

        #game-overlay .go-yasmin {
            position: absolute;
            left: max(16px, calc(50% - 672px));
            bottom: 0;
            width: 152px;
            height: auto;
            user-select: none;
            pointer-events: none;
        }

        /* pop_up (fumetto sopra l'icona) — comparirà dopo 5'' */
        #game-overlay .go-popup {
            position: absolute;
            left: calc(max(16px, calc(50% - 672px)) + 100px);
            bottom: 100px;
            width: 239px;
            min-height: 136px;
            box-sizing: border-box;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: var(--popup-fill, #fff);
            border: 1px solid var(--popup-stroke, #000);
            pointer-events: auto;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        #game-overlay .go-popup.is-visible {
            opacity: 1;
        }

        /* bottone "write" dentro il pop-up story */
        #game-overlay .go-popup .primary-button {
            width: 100%;
            pointer-events: auto;
        }

        /* ===== Mobile: stessa logica delle altre pagine (breakpoint 768px):
           logo in alto a tutta larghezza, i due bottoni affiancati sotto. ===== */
        @media (max-width: 768px) {
            #game-overlay .go-header {
                top: 16px;
                width: calc(100% - 40px);
                flex-wrap: wrap;
                row-gap: 16px;
                column-gap: 16px;
                justify-content: center;
            }
            #game-overlay .go-logo {
                order: -1;
                flex: 0 0 100%;
                width: auto;
                height: 60px;
                object-fit: contain;
            }
            #game-overlay .go-header .primary-button {
                flex: 1 1 0;
                min-width: 0;
                width: auto;
                padding: 9px;
                font-size: 12px;
            }
            #game-overlay .go-yasmin { width: 108px; }
            #game-overlay .go-popup { left: 12px; width: min(239px, 78vw); bottom: 92px; }
        }
    </style>
</head>

<body>
    <canvas id="scene-canvas"></canvas>

    <!-- ===== Overlay di caricamento (barra di avanzamento reale del download dei modelli) ===== -->
    <section class="loading-page" id="scene-loading" aria-hidden="false">
        <div class="loading-input">
            <img class="loading-logo" src="assets/images/logo_image.gif" alt="Bratz">

            <div class="container-bar-and-text">
                <div class="loading-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"
                    id="scene-loading-bar">
                    <div class="loading-bar-fill" id="scene-loading-fill"></div>
                </div>
                <p class="loading-text" id="scene-loading-text">Loading...</p>
            </div>
        </div>
    </section>

    <!-- Suggerimento comandi movimento -->
    <div id="scene-hint">⬆️⬇️ / W S muoviti &nbsp;·&nbsp; ⬅️➡️ / A D gira &nbsp;·&nbsp; Shift corri</div>

    <!-- ===== Overlay 3dgame/enter_page (Figma) ===== -->
    <div id="game-overlay" aria-hidden="false">
        <header class="go-header">
            <button type="button" class="primary-button active" id="go-dollz-btn">marpi.dollz</button>
            <img class="go-logo" src="assets/images/logo_image.gif" alt="Bratz">
            <button type="button" class="primary-button" id="go-community-btn" disabled>community</button>
        </header>

        <img class="go-yasmin" src="assets/images/yasmin_icon.png" alt="">

        <!-- pop_up: nascosto, compare dopo 5''. Il contenuto cambierà nel tempo. -->
        <aside class="go-popup" id="go-popup" aria-hidden="true" hidden>
            <button type="button" class="enter-popup-close" id="go-popup-close">Close</button>
            <p class="enter-popup-text">Welcome to my room, babe.<br>This is where you'll write<br>your stories. Explore the<br>space and find daily<br>hidden objects.</p>
        </aside>
    </div>

    <!-- Overlay "stories": tiene viva la scena 3D sotto, così tornando indietro riprende dal punto esatto -->
    <iframe id="stories-frame" class="stories-frame" title="Stories" hidden></iframe>

    <script type="module" src="scene.js?v=17"></script>
</body>

</html>
