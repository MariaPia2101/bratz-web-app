<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRATZ — My Faves</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- ===== LOADING PAGE: visibile finché il caricamento REALE della pagina non è completo ===== -->
    <section class="loading-page" id="loading-page" style="display:flex;opacity:1;" aria-hidden="false">
        <div class="loading-input">
            <img class="loading-logo" src="assets/images/logo_image.gif" alt="Bratz">
            <div class="container-bar-and-text">
                <div class="loading-bar" id="loading-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100"
                    aria-valuenow="0">
                    <div class="loading-bar-fill" id="loading-bar-fill"></div>
                </div>
                <p class="loading-text" id="loading-text">Loading...</p>
            </div>
        </div>
    </section>

    <!-- ===== MY FAVES / EMPTY PAGE ===== -->
    <main class="mydollz-page">
        <div class="mydollz-page__content" id="faves-content">
            <!-- container_myfaves/empty_page -->
            <div class="container-mydollz-page">

                <!-- upper_container_user_pages -->
                <div class="upper-container-mydollz">
                    <header class="user-header">
                        <button type="button" class="primary-button is-current" id="user-dollz-btn">marpi.dollz</button>
                        <img class="user-logo" src="assets/images/logo_image.gif" alt="Bratz">
                        <button type="button" class="primary-button" id="user-community-btn" disabled>community</button>
                    </header>

                    <!-- container_title: back + "My faves" -->
                    <div class="container-title">
                        <button type="button" class="back-button" id="faves-back-btn" aria-label="Torna indietro">
                            <svg class="back-button__arrow" viewBox="0 0 53 34" fill="none"
                                xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M17.4668 13.6973L14.8838 16.3486H39.998V17.3486H14.8838L17.4668 20L16.75 20.6973L13.3398 17.1973L13 16.8486L13.3398 16.5L16.75 13L17.4668 13.6973Z"
                                    fill="black" />
                            </svg>
                        </button>
                        <h1 class="card-title">My faves</h1>
                    </div>
                </div>

                <!-- bottom_container_myfaves/empty_page -->
                <div class="bottom-container-subpage">
                    <p class="page-description">Your style library. You can flip<br>through your favorite issues.</p>

                    <!-- container_empty: mostrato solo se non ci sono preferiti -->
                    <div class="empty-state empty-state--page" id="faves-empty">
                        <p class="empty-state__text">Empty style library.<br>Visit the community and<br>collect your
                            favorites.</p>
                    </div>

                    <!-- myfaves_page (full): i magazine salvati dalla community -->
                    <div class="community-grid" id="faves-grid" hidden></div>
                </div>

            </div>
        </div>
    </main>

    <script src="audio.js"></script>
    <script src="community-unlock.js"></script>
    <script src="myfaves_empty_page.js?v=2"></script>
    <script src="click-sound.js?v=2"></script>
</body>

</html>
