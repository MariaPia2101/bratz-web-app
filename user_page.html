<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRATZ — User Page</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- ===== LOADING PAGE: visibile finché il caricamento REALE della pagina non è completo ===== -->
    <section class="loading-page" id="loading-page" style="display:flex;opacity:1;" aria-hidden="false">
        <div class="loading-input">
            <img class="loading-logo" src="assets/images/logo_image.gif" alt="Bratz">

            <div class="container-bar-and-text">
                <div class="loading-bar" id="loading-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100"
                    aria-valuenow="0">
                    <div class="loading-bar-fill" id="loading-bar-fill"></div>
                </div>
                <p class="loading-text" id="loading-text">Loading...</p>
            </div>
        </div>
    </section>

    <!-- ===== USER PAGE ===== -->
    <main class="user-page">
        <div class="user-page__content" id="user-content">
            <!-- container_user_page -->
            <div class="container-user-page">

                <!-- upper_container_user&community_page -->
                <div class="upper-container">
                    <header class="user-header">
                        <button type="button" class="primary-button is-current" id="user-dollz-btn">marpi.dollz</button>
                        <img class="user-logo" src="assets/images/logo_image.gif" alt="Bratz">
                        <button type="button" class="primary-button" id="user-community-btn" disabled>community</button>
                    </header>

                    <p class="user-welcome" id="user-welcome">Welcome MarPi.Dollz,<br>your stories are waiting for you.</p>
                </div>

                <!-- bottom_container_user_page -> container_cards_user_page -->
                <div class="bottom-container-user-page">
                    <div class="cards-user-page">

                        <!-- card_user_page: My dollz -->
                        <article class="card-user-page">
                            <img class="card-user-page__bg" src="assets/images/mydollz_image.png" alt="">
                            <div class="card-user-page__content">
                                <h2 class="card-title">My dollz</h2>
                                <div class="container-text-button">
                                    <p class="card-description">All your girls in one place.<br>Click below to see them.
                                    </p>
                                    <button type="button" class="secondary-button" id="see-more-mydollz">
                                        <span class="secondary-button__text">See more</span>
                                        <img class="secondary-button__arrow" src="assets/arrowicon.svg" alt="">
                                    </button>
                                </div>
                            </div>
                        </article>

                        <!-- card_user_page: My Trophies -->
                        <article class="card-user-page">
                            <img class="card-user-page__bg" src="assets/images/mytrophies_image.png" alt="">
                            <div class="card-user-page__content">
                                <h2 class="card-title">My Trophies</h2>
                                <div class="container-text-button">
                                    <p class="card-description">See all your glam rewards.<br>Click below for your status.
                                    </p>
                                    <button type="button" class="secondary-button" id="see-more-mytrophies">
                                        <span class="secondary-button__text">See more</span>
                                        <img class="secondary-button__arrow" src="assets/arrowicon.svg" alt="">
                                    </button>
                                </div>
                            </div>
                        </article>

                        <!-- card_user_page: My faves -->
                        <article class="card-user-page">
                            <img class="card-user-page__bg" src="assets/images/myfaves_image.png" alt="">
                            <div class="card-user-page__content">
                                <h2 class="card-title">My faves</h2>
                                <div class="container-text-button">
                                    <p class="card-description">Your top picks saved here.<br>Click below to look at them.
                                    </p>
                                    <button type="button" class="secondary-button" id="see-more-myfaves">
                                        <span class="secondary-button__text">See more</span>
                                        <img class="secondary-button__arrow" src="assets/arrowicon.svg" alt="">
                                    </button>
                                </div>
                            </div>
                        </article>

                    </div>
                </div>

            </div>
        </div>
    </main>

    <script src="user_page.js"></script>
</body>

</html>
