<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRATZ — Stories</title>
    <link rel="stylesheet" href="style.css">

    <style>
        /* ===== stories_page (stile provvisorio, in attesa del Figma) ===== */
        .stories-page {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px;
            box-sizing: border-box;
        }

        .stories-page__content {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        /* container_lecture: VUOTO di default, compilabile durante la scrittura */
        .container-lecture {
            min-height: 60vh;
            box-sizing: border-box;
            padding: 24px;
            background: var(--popup-fill, #fff);
            border: 1px solid var(--popup-stroke, #000);
            font-family: var(--font-mono, "Akkurat Mono", monospace);
            font-size: 14px;
            line-height: 17px;
            letter-spacing: -0.98px;
            color: var(--popup-text, #000);
            outline: none;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        /* placeholder mostrato solo quando è vuoto */
        .container-lecture:empty::before {
            content: attr(data-placeholder);
            opacity: 0.4;
        }

        @media (max-width: 768px) {
            .stories-page { padding: 20px; }
            .container-lecture { min-height: 62vh; padding: 16px; }
        }
    </style>
</head>

<body>
    <!-- ===== LOADING PAGE ===== -->
    <section class="loading-page" id="loading-page" style="display:flex;opacity:1;" aria-hidden="false">
        <div class="loading-input">
            <img class="loading-logo" src="assets/images/logo_image.gif" alt="Bratz">
            <div class="container-bar-and-text">
                <div class="loading-bar" id="loading-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100"
                    aria-valuenow="0">
                    <div class="loading-bar-fill" id="loading-bar-fill"></div>
                </div>
                <p class="loading-text" id="loading-text">Loading...</p>
            </div>
        </div>
    </section>

    <!-- ===== STORIES PAGE ===== -->
    <main class="stories-page">
        <div class="stories-page__content" id="stories-content">
            <header class="user-header">
                <button type="button" class="primary-button is-current" id="user-dollz-btn">marpi.dollz</button>
                <img class="user-logo" src="assets/images/logo_image.gif" alt="Bratz">
                <button type="button" class="primary-button" id="user-community-btn" disabled>community</button>
            </header>

            <div class="container-title">
                <button type="button" class="back-button" id="stories-back-btn" aria-label="Torna indietro">
                    <svg class="back-button__arrow" viewBox="0 0 53 34" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M17.4668 13.6973L14.8838 16.3486H39.998V17.3486H14.8838L17.4668 20L16.75 20.6973L13.3398 17.1973L13 16.8486L13.3398 16.5L16.75 13L17.4668 13.6973Z"
                            fill="black" />
                    </svg>
                </button>
                <h1 class="card-title">Stories</h1>
            </div>

            <!-- container_lecture: vuoto, compilabile durante la scrittura -->
            <div class="container-lecture" id="container-lecture" contenteditable="true" role="textbox"
                aria-multiline="true" data-placeholder="Write your story..."></div>
        </div>
    </main>

    <script src="stories_page.js"></script>
</body>

</html>
